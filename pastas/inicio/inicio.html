<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DarCraker - Início</title>
    <link rel="stylesheet" href="/pastas/inicio/inicio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header class="navbar">
      <div class="logo">DarCraker</div>
      <i class="fas fa-bars menu-toggle" onclick="toggleSidebar()"></i>
    </header>

    <nav id="sidebar" class="sidebar">
    <div class="sidebar-content">
      
      <a href="/pastas/inicio/inicio.html" class="sidebar-link">
            <img src="/pastas/img/inicio.jpg" alt="Icone inicio" class="sidebar-img">
            <span class="sidebar-text">Inicio</span>
        </a>
      
        <a href="/pastas/heroi/heroi.html" class="sidebar-link">
            <img src="/pastas/img/heroi.jpg" alt="Icone Personagem" class="sidebar-img">
            <span class="sidebar-text">Herói</span>
        </a>
        
        <a href="/pastas/mundo/mundo.html" class="sidebar-link">
            <img src="/pastas/img/icone_mundo.png" alt="Icone mundo " class="sidebar-img">
            <span class="sidebar-text">Mundo</span>
        </a>
        
        <a href="/pastas/wiki/wiki.html" class="sidebar-link">
            <img src="/pastas/img/wiki.jpg" alt="Icone wiki" class="sidebar-img">
            <span class="sidebar-text">Wiki</span>
        </a>
        
        
        
       
        
        <a href="/pastas/atualizacoes/atualizacoes.html" class="sidebar-link">
            <img src="/pastas/img/atualizacoes.jpg" alt="Icone atualizacoes" class="sidebar-img">
            <span class="sidebar-text">Atualização</span>
        </a>
        
       <a href="/sair" class="sidebar-link">
    <img src="/pastas/img/home.jpg" alt="Sair" class="sidebar-img">
    <span class="sidebar-text">Sair</span>
</a>
        

        
       
        
        
        

        </div>
</nav>

    <main class="content">
        <h2>Bem-vindo ao DarCraker</h2>
        <p>Você está logado e sua sessão está ativa!</p>
    </main>

    <main class="status-widget-content">
        <h3 id="hero-info-header" class="collapsible-header" onclick="toggleHeroInfo()">
            Info. Gerais do Herói
            <i id="hero-info-icon" class="fas fa-chevron-down"></i>
        </h3>
        
        <div id="hero-info-content" class="status-list is-expanded">
            <p class="stat-paragraph">
                <span class="stat-label">🏅 Level:</span>
                <span id="inicio-level-valor" class="stat-value">...</span>
            </p>
            <p class="stat-paragraph">
                <span class="stat-label">Experiência:</span>
                <span id="inicio-exp-valor" class="stat-value">... / ...</span>
            </p>
            <p class="stat-paragraph">
                <span class="stat-label">❤️ Vida:</span>
                <span id="inicio-vida-valor" class="stat-value">... / ...</span>
            </p>
            <p class="stat-paragraph">
                <span class="stat-label">💙 Mana:</span>
                <span id="inicio-mana-valor" class="stat-value">... / ...</span>
            </p>
        </div>
    </main>

    <script src="/pastas/heroi/status/status.js"></script> 
    <script src="/pastas/inicio/inicio.js"></script>
</body>
</html>
